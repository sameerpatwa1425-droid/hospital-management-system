<!DOCTYPE html>
<html>

<head>

    <title>New Patient Registration</title>

    <style>

        * {

            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial;

        }

        body {

            display: flex;
            background-color: #f4f7fc;

        }

        /* SIDEBAR */

        .sidebar {

            width: 250px;
            height: 100vh;
            background-color: #1e3a8a;
            color: white;
            position: fixed;
            padding: 20px;

        }

        .sidebar h2 {

            text-align: center;
            margin-bottom: 40px;

        }

        .sidebar ul {

            list-style: none;

        }

        .sidebar ul li {

            padding: 15px;
            margin-bottom: 15px;
            border-radius: 8px;
            background-color: rgba(255,255,255,0.1);
            cursor: pointer;

            transition: 0.3s;

        }

        .sidebar ul li:hover {

            background-color: rgba(255,255,255,0.3);

        }

        .sidebar ul li a {

            text-decoration: none;
            color: white;
            display: block;

        }

        /* MAIN CONTENT */

        .main-content {

            margin-left: 250px;
            width: calc(100% - 250px);
            padding: 30px;

        }

        /* TOPBAR */

        .topbar {

            background-color: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 2px 10px rgba(0,0,0,0.1);

            display: flex;
            justify-content: space-between;
            align-items: center;

            margin-bottom: 30px;

        }

        .topbar h1 {

            color: #1e3a8a;

        }

        /* FORM CARD */

        .form-card {

            background-color: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0px 2px 10px rgba(0,0,0,0.1);

        }

        .form-card h2 {

            color: #1e3a8a;
            margin-bottom: 20px;

        }

        input, select {

            width: 100%;
            padding: 12px;
            margin-top: 15px;
            border: 1px solid #ccc;
            border-radius: 5px;

        }

        button {

            margin-top: 20px;
            padding: 12px 25px;
            border: none;
            border-radius: 5px;
            background-color: #1e3a8a;
            color: white;
            cursor: pointer;

        }

    </style>

</head>

<body>

    <!-- SIDEBAR -->

    <div class="sidebar">

        <h2>Reception Panel</h2>

        <ul>

            <li>
                <a href="reception-dashboard.html">
                    Dashboard
                </a>
            </li>

            <li>
                <a href="new-patient.html">
                    New Patient
                </a>
            </li>

            <li>
                <a href="patient-search.html">
                    Patient Search
                </a>
            </li>

            <li>
                <a href="opd-queue.html">
                    OPD Queue
                </a>
            </li>

            <li>
                <a href="billing.html">
                    Billing
                </a>
            </li>

            <li>
                <a href="login.html">
                    Logout
                </a>
            </li>

        </ul>

    </div>

    <!-- MAIN CONTENT -->

    <div class="main-content">

        <!-- TOPBAR -->

        <div class="topbar">

            <h1>New Patient Registration</h1>

            <h3>Reception Department</h3>

        </div>

        <!-- FORM -->

        <div class="form-card">

            <h2>Patient Details</h2>

            <form id="patientForm">

                <input type="text"
                       id="name"
                       placeholder="Patient Name"
                       required>

                <input type="number"
                       id="age"
                       placeholder="Age"
                       required>

                <select id="gender">

                    <option>Male</option>
                    <option>Female</option>

                </select>

                <input type="text"
                       id="disease"
                       placeholder="Disease"
                       required>

                <input type="text"
                       id="mobileNumber"
                       placeholder="Mobile Number"
                       required>

                <input type="text"
                       id="address"
                       placeholder="Address"
                       required>

                <select id="patientType">

                    <option>New</option>
                    <option>Old</option>

                </select>

                <button type="submit">

                    Register Patient

                </button>

            </form>

        </div>

    </div>

    <script>

        document.getElementById("patientForm")
            .addEventListener("submit",
            async function(event) {

            event.preventDefault();

            const patient = {

                name:
                    document.getElementById("name").value,

                age:
                    parseInt(document.getElementById("age").value),

                gender:
                    document.getElementById("gender").value,

                disease:
                    document.getElementById("disease").value,

                mobileNumber:
                    document.getElementById("mobileNumber").value,

                address:
                    document.getElementById("address").value,

                patientType:
                    document.getElementById("patientType").value

            };

            await fetch("/addPatient", {

                method: "POST",

                headers: {

                    "Content-Type": "application/json"

                },

                body: JSON.stringify(patient)

            });

            alert("Patient Registered Successfully");

            document.getElementById("patientForm").reset();

        });

    </script>

</body>

</html>

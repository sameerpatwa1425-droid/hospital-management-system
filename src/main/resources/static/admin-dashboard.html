<!DOCTYPE html>
<html>

<head>

    <title>Admin Dashboard</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        * {

            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial;

        }

        body {

            display: flex;
            min-height: 100vh;

            background-color: #f3f4f6;

            transition: 0.3s;

        }

        /* DARK MODE */

        body.dark {

            background-color: #111827;
            color: white;

        }

        body.dark .sidebar {

            background-color: #030712;

        }

        body.dark .card,
        body.dark .chart-container,
        body.dark .admin-box {

            background-color: #1f2937;
            color: white;

        }

        body.dark .card h2,
        body.dark .topbar h1 {

            color: white;

        }

        body.dark .card p {

            color: #60a5fa;

        }

        /* SIDEBAR */

        .sidebar {

            width: 260px;
            background-color: #111827;
            color: white;

            padding: 30px 20px;

            position: fixed;
            height: 100%;

            transition: 0.3s;

        }

        .sidebar h2 {

            margin-bottom: 40px;
            text-align: center;
            font-size: 26px;

        }

        .sidebar ul {

            list-style: none;

        }

        .sidebar ul li {

            margin-bottom: 20px;

        }

        .sidebar ul li a {

            text-decoration: none;
            color: white;

            font-size: 17px;

            display: block;

            padding: 12px 15px;

            border-radius: 8px;

            transition: 0.3s;

        }

        .sidebar ul li a:hover {

            background-color: #2563eb;

        }

        /* MAIN CONTENT */

        .main-content {

            margin-left: 260px;
            padding: 30px;
            width: 100%;

        }

        .topbar {

            display: flex;
            justify-content: space-between;
            align-items: center;

            margin-bottom: 30px;

        }

        .topbar h1 {

            color: #111827;

        }

        .top-actions {

            display: flex;
            gap: 15px;
            align-items: center;

        }

        .admin-box {

            background-color: white;

            padding: 10px 18px;

            border-radius: 10px;

            box-shadow:
                0px 2px 8px rgba(0, 0, 0, 0.1);

        }

        .theme-btn {

            padding: 10px 18px;

            border: none;

            border-radius: 10px;

            background-color: #2563eb;

            color: white;

            cursor: pointer;

            transition: 0.3s;

        }

        .theme-btn:hover {

            background-color: #1e40af;

        }

        /* DASHBOARD CARDS */

        .dashboard {

            display: grid;

            grid-template-columns:
                repeat(auto-fit, minmax(240px, 1fr));

            gap: 20px;

            margin-bottom: 40px;

        }

        .card {

            background-color: white;

            padding: 25px;

            border-radius: 16px;

            box-shadow:
                0px 4px 12px rgba(0, 0, 0, 0.08);

            transition: 0.3s;

        }

        .card:hover {

            transform: translateY(-5px);

        }

        .card h2 {

            font-size: 18px;
            margin-bottom: 15px;

            color: #374151;

        }

        .card p {

            font-size: 34px;
            font-weight: bold;

            color: #2563eb;

        }

        /* CHART */

        .chart-container {

            background-color: white;

            padding: 25px;

            border-radius: 16px;

            box-shadow:
                0px 4px 12px rgba(0, 0, 0, 0.08);

        }

        /* RESPONSIVE */

        @media(max-width: 900px) {

            .sidebar {

                width: 100%;
                height: auto;
                position: relative;

            }

            .main-content {

                margin-left: 0;

            }

            body {

                flex-direction: column;

            }

        }
    </style>

</head>

<body>

    <!-- SIDEBAR -->

    <div class="sidebar">

        <h2>HMS Admin</h2>

        <ul>

            <li><a href="#">Dashboard</a></li>

            <li><a href="#">Patients</a></li>

            <li><a href="#">Billing</a></li>

            <li><a href="#">Reports</a></li>

            <li><a href="#">Analytics</a></li>

            <li><a href="#">Backup</a></li>

            <li><a href="/login.html">Logout</a></li>

        </ul>

    </div>

    <!-- MAIN CONTENT -->

    <div class="main-content">

        <!-- TOPBAR -->

        <div class="topbar">

            <h1>
                Hospital Analytics Dashboard
            </h1>

            <div class="top-actions">

                <button class="theme-btn" onclick="toggleTheme()">
                    Toggle Theme
                </button>

                <div class="admin-box">

                    Admin Panel

                </div>

            </div>

        </div>

        <!-- ANALYTICS CARDS -->

        <div class="dashboard">

            <div class="card">

                <h2>Total Patients</h2>

                <p id="totalPatients">0</p>

            </div>

            <div class="card">

                <h2>Completed Consultations</h2>

                <p id="completedConsultations">0</p>

            </div>

            <div class="card">

                <h2>Total Revenue</h2>

                <p id="totalRevenue">₹0</p>

            </div>

            <div class="card">

                <h2>Pending Payments</h2>

                <p id="pendingPayments">₹0</p>

            </div>

            <div class="card">

                <h2>Deleted Records</h2>

                <p id="deletedRecords">0</p>

            </div>

        </div>

        <!-- CHART -->

        <div class="chart-container">

            <canvas id="analyticsChart"></canvas>

        </div>

    </div>

    <script>

        /* THEME TOGGLE */

        function toggleTheme() {

            document.body.classList.toggle("dark");

        }

        /* LOAD ANALYTICS */

        async function loadAnalytics() {

            const response =
                await fetch("/analytics");

            const data =
                await response.json();

            document.getElementById(
                "totalPatients"
            ).innerText =
                data.totalPatients;

            document.getElementById(
                "completedConsultations"
            ).innerText =
                data.completedConsultations;

            document.getElementById(
                "totalRevenue"
            ).innerText =
                "\u20B9" + data.totalRevenue;

            document.getElementById(
                "pendingPayments"
            ).innerText =
                "\u20B9" + data.pendingPayments;

            document.getElementById(
                "deletedRecords"
            ).innerText =
                data.deletedRecords;

            /* CHART */

            const ctx =
                document.getElementById(
                    "analyticsChart"
                );

            new Chart(ctx, {

                type: "bar",

                data: {

                    labels: [

                        "Patients",
                        "Completed",
                        "Deleted"

                    ],

                    datasets: [{

                        label:
                            "Hospital Statistics",

                        data: [

                            data.totalPatients,
                            data.completedConsultations,
                            data.deletedRecords

                        ],

                        borderWidth: 1

                    }]

                },

                options: {

                    responsive: true,

                    scales: {

                        y: {

                            beginAtZero: true

                        }

                    }

                }

            });

        }

        loadAnalytics();

    </script>

</body>

</html>

<!DOCTYPE html>
<html>

<head>

    <title>Doctor Dashboard</title>

    <style>

        * {

            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial;

        }

        body {

            display: flex;
            min-height: 100vh;
            background-color: #f3f4f6;

        }

        /* SIDEBAR */

        .sidebar {

            width: 260px;
            background-color: #111827;
            color: white;

            padding: 30px 20px;

            position: fixed;
            height: 100%;

        }

        .sidebar h2 {

            margin-bottom: 40px;
            text-align: center;
            font-size: 26px;

        }

        .sidebar ul {

            list-style: none;

        }

        .sidebar ul li {

            margin-bottom: 20px;

        }

        .sidebar ul li a {

            text-decoration: none;
            color: white;

            font-size: 17px;

            display: block;

            padding: 12px 15px;

            border-radius: 8px;

            transition: 0.3s;

        }

        .sidebar ul li a:hover {

            background-color: #2563eb;

        }

        /* MAIN CONTENT */

        .main-content {

            margin-left: 260px;
            padding: 30px;
            width: 100%;

        }

        .topbar {

            display: flex;
            justify-content: space-between;
            align-items: center;

            margin-bottom: 30px;

        }

        .topbar h1 {

            color: #111827;

        }

        .doctor-box {

            background-color: white;

            padding: 10px 18px;

            border-radius: 10px;

            box-shadow:
                0px 2px 8px rgba(0,0,0,0.1);

        }

        /* VISITS */

        .visit-container {

            display: grid;

            grid-template-columns:
                repeat(auto-fit, minmax(350px, 1fr));

            gap: 20px;

        }

        .visit-card {

            background-color: white;

            padding: 25px;

            border-radius: 16px;

            box-shadow:
                0px 4px 12px rgba(0,0,0,0.08);

        }

        .visit-card h2 {

            margin-bottom: 15px;
            color: #111827;

        }

        .visit-card p {

            margin-bottom: 8px;
            color: #374151;

        }

        textarea {

            width: 100%;

            margin-top: 12px;

            padding: 12px;

            border-radius: 8px;
            border: 1px solid #ccc;

            resize: vertical;

        }

        .button-group {

            display: flex;
            gap: 10px;

            flex-wrap: wrap;

            margin-top: 15px;

        }

        button {

            padding: 12px 18px;

            border: none;

            border-radius: 8px;

            background-color: #2563eb;

            color: white;

            cursor: pointer;

            transition: 0.3s;

        }

        button:hover {

            background-color: #1e40af;

        }

        .pdf-btn {

            background-color: #059669;

        }

        .pdf-btn:hover {

            background-color: #047857;

        }

        /* RESPONSIVE */

        @media(max-width: 900px) {

            .sidebar {

                width: 100%;
                height: auto;
                position: relative;

            }

            .main-content {

                margin-left: 0;

            }

            body {

                flex-direction: column;

            }

        }

    </style>

</head>

<body>

    <!-- SIDEBAR -->

    <div class="sidebar">

        <h2>Doctor Panel</h2>

        <ul>

            <li>
                <a href="#">
                    Dashboard
                </a>
            </li>

            <li>
                <a href="#">
                    Consultations
                </a>
            </li>

            <li>
                <a href="#">
                    Prescriptions
                </a>
            </li>

            <li>
                <a href="#">
                    Reports
                </a>
            </li>

            <li>
                <a href="/login.html">
                    Logout
                </a>
            </li>

        </ul>

    </div>

    <!-- MAIN CONTENT -->

    <div class="main-content">

        <!-- TOPBAR -->

        <div class="topbar">

            <h1>
                Doctor Consultation Dashboard
            </h1>

            <div class="doctor-box">

                Doctor Panel

            </div>

        </div>

        <!-- VISITS -->

        <div class="visit-container"
             id="visitContainer">

        </div>

    </div>

    <script>

        async function loadVisits() {

            const response =
                await fetch("/opdVisits");

            const visits =
                await response.json();

            const container =
                document.getElementById(
                    "visitContainer"
                );

            container.innerHTML = "";

            visits.forEach(visit => {

                const card =
                    document.createElement("div");

                card.className =
                    "visit-card";

                card.innerHTML = `

                    <h2>
                        ${visit.patientName}
                    </h2>

                    <p>
                        <b>Visit ID:</b>
                        ${visit.visitId}
                    </p>

                    <p>
                        <b>Doctor:</b>
                        ${visit.doctorName}
                    </p>

                    <p>
                        <b>Status:</b>
                        ${visit.status}
                    </p>

                    <textarea
                        id="diagnosis-${visit.visitId}"
                        placeholder="Enter Diagnosis"
                    >${visit.diagnosis || ""}</textarea>

                    <textarea
                        id="medicines-${visit.visitId}"
                        placeholder="Enter Medicines"
                    >${visit.medicines || ""}</textarea>

                    <textarea
                        id="advice-${visit.visitId}"
                        placeholder="Enter Advice"
                    >${visit.advice || ""}</textarea>

                    <div class="button-group">

                        <button onclick="
                            saveConsultation(
                                ${visit.visitId}
                            )
                        ">

                            Save Consultation

                        </button>

                        <button
                            class="pdf-btn"

                            onclick="
                                generatePrescription(
                                    ${visit.visitId}
                                )
                            "
                        >

                            Prescription PDF

                        </button>

                    </div>

                `;

                container.appendChild(card);

            });

        }

        async function saveConsultation(id) {

            const diagnosis =
                document.getElementById(
                    `diagnosis-${id}`
                ).value;

            const medicines =
                document.getElementById(
                    `medicines-${id}`
                ).value;

            const advice =
                document.getElementById(
                    `advice-${id}`
                ).value;

            const response =
                await fetch(
                    `/saveConsultation/${id}`,
                    {

                        method: "PUT",

                        headers: {

                            "Content-Type":
                                "application/json"

                        },

                        body: JSON.stringify({

                            diagnosis:
                                diagnosis,

                            medicines:
                                medicines,

                            advice:
                                advice

                        })

                    }
                );

            const message =
                await response.text();

            alert(message);

            loadVisits();

        }

        function generatePrescription(id) {

            window.open(
                `/generatePrescription/${id}`,
                "_blank"
            );

        }

        loadVisits();

    </script>

</body>

</html>

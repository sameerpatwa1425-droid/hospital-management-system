<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Doctor Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial
        }

        body {
            display: flex;
            height: 100vh;
            background: #f3f4f6
        }

        .sidebar {
            width: 250px;
            background: #111827;
            color: #fff;
            padding: 20px
        }

        .sidebar h2 {
            text-align: center;
            margin-bottom: 20px
        }

        .main {
            flex: 1;
            padding: 20px
        }

        .topbar {
            margin-bottom: 20px
        }

        .layout {
            display: grid;
            grid-template-columns: 320px 1fr;
            gap: 20px;
            height: calc(100vh - 100px)
        }

        .queue,
        .panel {
            background: #fff;
            border-radius: 12px;
            padding: 15px;
            overflow: auto
        }

        .patient-item {
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            margin-bottom: 10px;
            cursor: pointer
        }

        .patient-item:hover,
        .active {
            background: #dbeafe
        }

        input,
        textarea {
            width: 100%;
            padding: 10px;
            margin-top: 8px;
            margin-bottom: 12px
        }

        button {
            padding: 10px 15px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background: #2563eb;
            color: white;
            margin-right: 10px
        }

        .green {
            background: #059669
        }
    </style>
</head>

<body>
    <div class="sidebar">
        <h2>Doctor Panel</h2>
    </div>

    <div class="main">
        <div class="topbar">
            <h1>Doctor Consultation Dashboard</h1>
        </div>

        <div class="layout">
            <div class="queue">
                <h3>Waiting Patients</h3>
                <div id="queueList"></div>
            </div>

            <div class="panel">
                <h2 id="patientName">Select Patient</h2>
                <p><b>Visit ID:</b> <span id="visitId"></span></p>
                <p><b>Doctor:</b> <span id="doctorName"></span></p>

                <textarea id="diagnosis" placeholder="Diagnosis"></textarea>
                <textarea id="medicines" placeholder="Medicines"></textarea>
                <textarea id="advice" placeholder="Advice"></textarea>

                <button onclick="saveConsultation()">Save Consultation</button>
                <button class="green" onclick="generatePrescription()">Generate Prescription</button>
            </div>
        </div>
    </div>

    <script>
        let visits = [];
        let selectedVisit = null;

        async function loadQueue() {
            const response = await fetch('/opdVisits');
            visits = await response.json();

            visits = visits.filter(v => !v.status || v.status.toLowerCase() !== 'completed');

            const queue = document.getElementById('queueList');
            queue.innerHTML = '';

            visits.forEach(v => {
                const div = document.createElement('div');
                div.className = 'patient-item';
                div.innerHTML = `<b>${v.patientName}</b><br>Token: ${v.tokenNumber || '-'} `;
                div.onclick = () => selectPatient(v.visitId);
                queue.appendChild(div);
            });

            if (!selectedVisit && visits.length > 0) {
                selectPatient(visits[0].visitId);
            }
        }

        function selectPatient(id) {
            selectedVisit = visits.find(v => v.visitId === id);
            if (!selectedVisit) return;

            document.getElementById('patientName').innerText = selectedVisit.patientName;
            document.getElementById('visitId').innerText = selectedVisit.visitId;
            document.getElementById('doctorName').innerText = selectedVisit.doctorName;
            document.getElementById('diagnosis').value = selectedVisit.diagnosis || '';
            document.getElementById('medicines').value = selectedVisit.medicines || '';
            document.getElementById('advice').value = selectedVisit.advice || '';
        }

        async function saveConsultation() {
            if (!selectedVisit) return;

            const response = await fetch(`/saveConsultation/${selectedVisit.visitId}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    diagnosis: document.getElementById('diagnosis').value,
                    medicines: document.getElementById('medicines').value,
                    advice: document.getElementById('advice').value
                })
            });

            alert(await response.text());

            selectedVisit = null;
            await loadQueue();

            if (visits.length > 0) {
                selectPatient(visits[0].visitId);
            } else {
                document.getElementById('patientName').innerText = 'No Waiting Patients';
            }
        }

        function generatePrescription() {
            if (!selectedVisit) return;
            window.open(`/generatePrescription/${selectedVisit.visitId}`, '_blank');
        }

        loadQueue();
        setInterval(loadQueue, 10000);
    </script>
</body>

</html>

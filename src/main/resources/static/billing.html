<!DOCTYPE html>
<html>

<head>

    <title>Billing Management</title>

    <style>

        * {

            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial;

        }

        body {

            display: flex;
            background-color: #f4f7fc;

        }

        /* SIDEBAR */

        .sidebar {

            width: 250px;
            height: 100vh;
            background-color: #1e3a8a;
            color: white;
            position: fixed;
            padding: 20px;

        }

        .sidebar h2 {

            text-align: center;
            margin-bottom: 40px;

        }

        .sidebar ul {

            list-style: none;

        }

        .sidebar ul li {

            padding: 15px;
            margin-bottom: 15px;
            border-radius: 8px;
            background-color: rgba(255,255,255,0.1);

        }

        .sidebar ul li a {

            text-decoration: none;
            color: white;
            display: block;

        }

        /* MAIN CONTENT */

        .main-content {

            margin-left: 250px;
            width: calc(100% - 250px);
            padding: 30px;

        }

        /* TOPBAR */

        .topbar {

            background-color: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 2px 10px rgba(0,0,0,0.1);

            display: flex;
            justify-content: space-between;
            align-items: center;

            margin-bottom: 30px;

        }

        .topbar h1 {

            color: #1e3a8a;

        }

        /* TABLE SECTION */

        .table-box {

            background-color: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0px 2px 10px rgba(0,0,0,0.1);

        }

        table {

            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;

        }

        table th {

            background-color: #1e3a8a;
            color: white;
            padding: 12px;

        }

        table td {

            padding: 12px;
            border-bottom: 1px solid #ddd;
            text-align: center;

        }

        button {

            padding: 10px 15px;
            border: none;
            border-radius: 5px;
            color: white;
            cursor: pointer;

        }

        .pay-btn {

            background-color: green;

        }

        .pending {

            color: red;
            font-weight: bold;

        }

        .paid {

            color: green;
            font-weight: bold;

        }

    </style>

</head>

<body>

    <!-- SIDEBAR -->

    <div class="sidebar">

        <h2>Billing Panel</h2>

        <ul>

            <li>
                <a href="billing.html">
                    Billing Dashboard
                </a>
            </li>

            <li>
                <a href="login.html">
                    Logout
                </a>
            </li>

        </ul>

    </div>

    <!-- MAIN CONTENT -->

    <div class="main-content">

        <!-- TOPBAR -->

        <div class="topbar">

            <h1>Billing Management</h1>

            <h3>Accounts Department</h3>

        </div>

        <!-- BILLING TABLE -->

        <div class="table-box">

            <h2>Patient Billing Records</h2>

            <table>

                <thead>

                    <tr>

                        <th>Patient</th>
                        <th>Doctor</th>
                        <th>Total Fee</th>
                        <th>Deposited</th>
                        <th>Remaining</th>
                        <th>Status</th>
                        <th>Action</th>

                    </tr>

                </thead>

                <tbody id="billingTableBody">

                </tbody>

            </table>

        </div>

    </div>

    <script>

        async function loadBillingData() {

            const response =
                await fetch("/opdVisits");

            const visits =
                await response.json();

            const tableBody =
                document.getElementById("billingTableBody");

            tableBody.innerHTML = "";

            visits.forEach(visit => {

                const paymentStatus =
                    visit.remainingAmount <= 0
                    ? "Paid"
                    : "Pending";

                const statusClass =
                    paymentStatus === "Paid"
                    ? "paid"
                    : "pending";

                const row =
                    document.createElement("tr");

                row.innerHTML = `

                    <td>${visit.patientName}</td>

                    <td>${visit.doctorName}</td>

                    <td>${visit.consultationFee}</td>

                    <td>${visit.depositedAmount}</td>

                    <td>${visit.remainingAmount}</td>

                    <td class="${statusClass}">
                        ${paymentStatus}
                    </td>

                    <td>

                        <button class="pay-btn"
                            onclick="payAmount(
                                ${visit.visitId}
                            )">

                            Pay Amount

                        </button>

                    </td>

                `;

                tableBody.appendChild(row);

            });

        }

        /* PAYMENT FUNCTION */

        async function payAmount(id) {

            const amount =
                prompt("Enter Payment Amount");

            if(!amount) {

                return;

            }

            const response =
                await fetch(
                    `/payBill/${id}/${amount}`,
                    {
                        method: "PUT"
                    }
                );

            const message =
                await response.text();

            alert(message);

            loadBillingData();

        }

        loadBillingData();

    </script>

</body>

</html>
